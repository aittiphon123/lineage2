<html><title>Dyes Menu</title><body>
<center>
<table width=285 background="L2UI_CT1.Windows.Windows_DF_TooltipBG">
	<tr>
		<td><button value="Main" action="bypass admin_admin" width=45 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
		<td width=140 align=center>Set Level 0-30:</td>
		<td width=55 align=center><edit var="qbox" width=40 height=14></td>
		<td><button value="Back" action="bypass -h admin_admin6" width=45 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
	</tr>
</table>
<table border=0 cellpadding=0 cellspacing=0 width=292 height=330 background="L2UI_CH3.refinewnd_back_Pattern"><tr><td align=center>
<br><br><br><br>
<table width=280><tr><td align=center>
<table>
	<tr><td align=center><font color="LEVEL">Update dyes for:</font></td></tr>
	<tr><td></td></tr><tr><td align="center" valign="center" background="L2UI_CT1.Windows_DF_Drawer_Bg" width=180 height=40><font color="LEVEL"> %targetName% </font></td></tr>
</table>
<br><br><br><br>
<table border=0 bgcolor=282828 align=center cellpadding=2 cellspacing=2>
	<tr><td height=5 colspan=3></td></tr>
	<tr>
		<td align=center><button value="30" action="bypass -h admin_dye_level 1 30" width=45 height=20 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
		<td align=center><button value="30" action="bypass -h admin_dye_level 2 30" width=45 height=20 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
		<td align=center><button value="30" action="bypass -h admin_dye_level 3 30" width=45 height=20 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
	</tr>
	<tr>
		<td align=center>
			<table width=38 height=38 background="L2UI_CT1.Windows.Windows_DF_TooltipBG" cellpadding=3 cellspacing=0><tr><td align=center valign=middle>
				<table width=32 height=32 cellpadding=0 cellspacing=0><tr><td align=center background="%slot1_icon%">
					<button value=" " action="bypass -h admin_dye_level 1 $qbox" width=32 height=32 back="%slot1Level%" fore="%slot1Level%">
				</td></tr></table>
			</td></tr></table>
		</td>
		<td align=center>
			<table width=38 height=38 background="L2UI_CT1.Windows.Windows_DF_TooltipBG" cellpadding=3 cellspacing=0><tr><td align=center valign=middle>
				<table width=32 height=32 cellpadding=0 cellspacing=0><tr><td align=center background="%slot2_icon%">
					<button value=" " action="bypass -h admin_dye_level 2 $qbox" width=32 height=32 back="%slot2Level%" fore="%slot2Level%">
				</td></tr></table>
			</td></tr></table>
		</td>
		<td align=center>
			<table width=38 height=38 background="L2UI_CT1.Windows.Windows_DF_TooltipBG" cellpadding=3 cellspacing=0><tr><td align=center valign=middle>
				<table width=32 height=32 cellpadding=0 cellspacing=0><tr><td align=center background="%slot3_icon%">
					<button value=" " action="bypass -h admin_dye_level 3 $qbox" width=32 height=32 back="%slot3Level%" fore="%slot3Level%">
				</td></tr></table>
			</td></tr></table>
		</td>
	</tr>
	<tr><td height=5 colspan=3></td></tr>
	<tr>
		<td align=center><button value="RES" action="bypass -h admin_dye_reset 1" width=45 height=20 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
		<td align=center><button value="RES" action="bypass -h admin_dye_reset 2" width=45 height=20 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
		<td align=center><button value="RES" action="bypass -h admin_dye_reset 3" width=45 height=20 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
	</tr>
	<tr><td height=5 colspan=3></td></tr>
</table>
</td></tr></table>
<br>
</td></tr></table>
</center>
</body></html>

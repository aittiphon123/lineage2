# ---------------------------------------------------------------------------
# Catch-Up EXP Settings
# ---------------------------------------------------------------------------

# Enable catch-up multipliers for low/mid-level players.
# Default: False
EnableCatchUpExp = False

# Maximum player level that receives catch-up bonuses.
# Default: 76
CatchUpMaxLevel = 76

# EXP multiplier for eligible levels.
# Default: 1.20
CatchUpExpMultiplier = 1.20

# SP multiplier for eligible levels.
# Default: 1.10
CatchUpSpMultiplier = 1.10

# Optional low-level and mid-level granular multipliers.
# If player level <= CatchUpLowMaxLevel then *Low values are used.
# Else if player level <= CatchUpMidMaxLevel then *Mid values are used.
# Else default CatchUpExpMultiplier/CatchUpSpMultiplier are used (up to CatchUpMaxLevel).
CatchUpLowMaxLevel = 40
CatchUpExpMultiplierLow = 1.40
CatchUpSpMultiplierLow = 1.25
CatchUpMidMaxLevel = 61
CatchUpExpMultiplierMid = 1.25
CatchUpSpMultiplierMid = 1.15

# Optional rested bonus after staying offline for a period.
EnableRestedBonus = False
RestedMinOfflineHours = 8
RestedExpMultiplier = 1.10
RestedSpMultiplier = 1.05

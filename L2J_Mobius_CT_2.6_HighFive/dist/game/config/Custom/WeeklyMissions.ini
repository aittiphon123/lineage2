# ---------------------------------------------------------------------------
# Weekly Missions Settings
# ---------------------------------------------------------------------------

# Enable weekly mission system (MVP).
EnableWeeklyMissions = False

# Mission type:
# - MONSTER_KILL
# - PVP_KILL
# - ITEM_COLLECT
# - ONLINE_TIME
MissionType = MONSTER_KILL

# Generic mission target value used by the selected mission type.
# Example:
# - MONSTER_KILL => required kills
# - PVP_KILL => required kills
# - ITEM_COLLECT => required item count
# - ONLINE_TIME => required minutes
MissionTargetValue = 500

# Optional monster filter for MONSTER_KILL mission.
# Leave empty = any monster.
# Format: npcId,npcId,npcId
TargetMonsterIds =

# Optional required item for ITEM_COLLECT mission.
# Set both values > 0 to enable inventory-based objective.
RequiredItemId = 0
RequiredItemCount = 0

# Legacy compatibility for old configs.
MonsterKillTarget = 500

ExpReward = 5000000
SpReward = 500000

# Optional item rewards format: itemId,count;itemId,count
# Example adena + soulshots:
# RewardItems = 57,100000;1463,5000
RewardItems =

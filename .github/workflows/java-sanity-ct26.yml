name: java-sanity-ct26

on:
  pull_request:
  push:
    branches:
      - work

jobs:
  compile-ct26:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: L2J_Mobius_CT_2.6_HighFive
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Compile game/login sources
        run: |
          set -euo pipefail
          ./gradlew --no-daemon classes

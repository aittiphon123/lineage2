<html><title>Game Panel</title><body>
<center>
<table width=270 border=0 bgcolor="444444">
<tr>
<td><button value="Main" action="bypass admin_admin" width=65 height=21 back="L2UI.DefaultButton_click" fore="L2UI.DefaultButton"></td>
<td><button value="Char" action="bypass admin_admin6" width=65 height=21 back="L2UI.DefaultButton_click" fore="L2UI.DefaultButton"></td>
<td><button value="Game" action="bypass admin_admin2" width=65 height=21 back="L2UI.DefaultButton_click" fore="L2UI.DefaultButton"></td>
<td><button value="GM" action="bypass admin_admin7" width=65 height=21 back="L2UI.DefaultButton_click" fore="L2UI.DefaultButton"></td>
</tr>
</table><br>
<table width=270>
<tr>
<td><font color="LEVEL">QuickBox:</font></td>
<td><edit var="qbox" width=120 height=12></td>
<td><button value="Help" action="bypass admin_html help/server_menu.htm" width=45 height=15 back="sek.cbui94" fore="sek.cbui92"></td>
</tr>
</table>
<br>
Clan Related:<br1>
<table width=240>
<tr>
<td><button value="Create" action="bypass -h admin_pledge create $qbox" width=65 height=21 back="L2UI.DefaultButton_click" fore="L2UI.DefaultButton"></td>
<td><button value="Info" action="bypass -h admin_pledge info" width=65 height=21 back="L2UI.DefaultButton_click" fore="L2UI.DefaultButton"></td>
<td><button value="Set Level" action="bypass -h admin_pledge setlevel $qbox" width=65 height=21 back="L2UI.DefaultButton_click" fore="L2UI.DefaultButton"></td>
</tr>
<tr>
<td><button value="Delete" action="bypass -h admin_pledge dismiss $qbox" width=65 height=21 back="L2UI.DefaultButton_click" fore="L2UI.DefaultButton"></td>
<td><button value="Reputation" action="bypass -h admin_pledge rep $qbox" width=65 height=21 back="L2UI.DefaultButton_click" fore="L2UI.DefaultButton"></td>
<td><button value="P. leaders" action="bypass -h admin_clan_show_pending" width=65 height=21 back="L2UI.DefaultButton_click" fore="L2UI.DefaultButton"></td>
</tr>
</table>
<br>
War Related:<br1>
<table width=240>
<tr>
<td width=65></td>
<td><button value="Castle / CH" action="bypass admin_siege" width=65 height=21 back="L2UI.DefaultButton_click" fore="L2UI.DefaultButton"></td>
<td width=65></td>
</tr>
</table>
<br>
Grand Boss:<br1>
<table width="95">
<tr>
<td><button value="Grand Boss Info" action="bypass admin_grandboss" width="95" height="21" back="L2UI.pledgeButten2" fore="L2UI.pledgeButten1"></td>
</tr>
</table>
<br>
</center>
</body></html>
